<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dungeon Survivor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;user-select:none;overflow:hidden}
#topbar{width:400px;display:flex;justify-content:space-between;padding:8px 12px;background:#111128;border-radius:8px;margin:8px 0;font-size:14px}
.bar{flex:1;text-align:center}
.bar span{color:#4a9eff}
#canvas{border:2px solid #333;border-radius:4px;touch-action:none}
#bottombar{width:400px;display:flex;flex-direction:column;gap:4px;padding:8px;background:#111128;border-radius:8px;margin-top:8px;font-size:13px}
.hp-row,.xp-row{display:flex;align-items:center;gap:6px}
.progress{flex:1;height:10px;background:#222;border-radius:5px;overflow:hidden}
.hp-fill{height:100%;background:linear-gradient(90deg,#ff4444,#44ff44);transition:width .2s}
.xp-fill{height:100%;background:#4a9eff;transition:width .2s}
.lbl{width:35px}
#levelup{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);justify-content:center;align-items:center;flex-direction:column;gap:12px;z-index:100}
#levelup h2{font-size:20px;color:#4a9eff;margin-bottom:8px}
.cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.card{background:#1a1a3a;border:2px solid #4a9eff;border-radius:10px;padding:16px 12px;width:110px;text-align:center;cursor:pointer;transition:transform .1s}
.card:hover{transform:scale(1.05);background:#252550}
.card .icon{font-size:28px;margin-bottom:6px}
.card .name{font-size:13px;font-weight:bold;color:#fff;margin-bottom:4px}
.card .desc{font-size:11px;color:#aaa}
#death{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);justify-content:center;align-items:center;flex-direction:column;gap:16px;z-index:100}
#death h2{font-size:28px;color:#ff4444}
#death .stats{font-size:16px;color:#aaa;text-align:center;line-height:1.8}
.btns{display:flex;gap:12px}
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:bold}
.btn-revive{background:#ff4444;color:#fff}
.btn-restart{background:#4a9eff;color:#fff}
#start{display:flex;position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a1a;justify-content:center;align-items:center;flex-direction:column;gap:20px;z-index:100}
#start h1{font-size:32px;color:#4a9eff}
#start .controls{font-size:14px;color:#888;text-align:center;line-height:2}
#start .btn-start{background:#44aa44;color:#fff;padding:14px 32px;border:none;border-radius:8px;font-size:18px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>
<div id="start">
<h1>Dungeon Survivor</h1>
<div class="controls">
WASD / Arrow Keys to move<br>
Auto-attack nearby enemies<br>
Collect XP to level up<br>
Survive as long as possible!
</div>
<button class="btn-start" onclick="startGame()">START GAME</button>
</div>
<div id="topbar">
<div class="bar">Wave <span id="wave">1</span></div>
<div class="bar">Kills <span id="kills">0</span></div>
<div class="bar" id="timer">00:00</div>
</div>
<canvas id="canvas" width="400" height="600"></canvas>
<div id="bottombar">
<div class="hp-row"><span class="lbl">HP</span><div class="progress"><div class="hp-fill" id="hpfill" style="width:100%"></div></div><span id="hptext">100/100</span></div>
<div class="xp-row"><span class="lbl">XP</span><div class="progress"><div class="xp-fill" id="xpfill" style="width:0%"></div></div><span id="xptext">Lv.1</span></div>
<div style="text-align:right;margin-top:4px">Gold: <span id="gold">0</span></div>
</div>
<div id="levelup">
<h2>LEVEL UP!</h2>
<div class="cards" id="skillcards"></div>
</div>
<div id="death">
<h2>YOU DIED!</h2>
<div class="stats" id="deathstats"></div>
<div class="btns">
<button class="btn btn-revive" onclick="revive()">REVIVE</button>
<button class="btn btn-restart" onclick="restart()">RESTART</button>
</div>
</div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let game={running:false,wave:1,kills:0,gold:0,startTime:0,waveTimer:0,waveDelay:180};
let player={x:200,y:300,r:14,hp:100,maxHp:100,atk:10,atkSpeed:1,moveSpeed:3,atkRange:80,pickupRange:50,level:1,xp:0,xpNext:10};
let keys={},enemies=[],xpOrbs=[],goldOrbs=[],projectiles=[],particles=[];
let attackTimer=0,gameTime=0,waveEnemiesLeft=0,spawnTimer=0,enemiesToSpawn=0;

const ENEMY_TYPES={
slime:{r:12,speed:1,hp:20,color:'#44ff44',xp:2,gold:1},
skeleton:{r:16,speed:1.8,hp:50,color:'#ff8844',xp:5,gold:3},
orc:{r:22,speed:0.8,hp:120,color:'#ff4444',xp:10,gold:8},
boss:{r:35,speed:0.5,hp:500,color:'#aa0000',xp:50,gold:50}
};
const SKILLS=[
{icon:'SPEED',name:'Atk Speed+',desc:'+0.3 attack/sec',fn:()=>player.atkSpeed+=0.3},
{icon:'MOVE',name:'Move+',desc:'+0.8 move speed',fn:()=>player.moveSpeed+=0.8},
{icon:'DMG',name:'Damage+',desc:'+5 attack damage',fn:()=>player.atk+=5},
{icon:'HP',name:'Max HP+',desc:'+30 max HP',fn:()=>{player.maxHp+=30;player.hp=Math.min(player.hp+30,player.maxHp)}},
{icon:'PICKUP',name:'Pickup+',desc:'+20 pickup range',fn:()=>player.pickupRange+=20},
{icon:'RANGE',name:'Range+',desc:'+15 attack range',fn:()=>player.atkRange+=15}
];

function startGame(){
document.getElementById('start').style.display='none';
game.running=true;game.startTime=Date.now();
player={x:200,y:300,r:14,hp:100,maxHp:100,atk:10,atkSpeed:1,moveSpeed:3,atkRange:80,pickupRange:50,level:1,xp:0,xpNext:10};
enemies=[];xpOrbs=[];goldOrbs=[];projectiles=[];particles=[];
game.kills=0;game.gold=0;game.wave=1;game.waveTimer=0;
attackTimer=0;gameTime=0;spawnTimer=0;
waveEnemiesLeft=0;enemiesToSpawn=0;
startWave(1);requestAnimationFrame(loop);
}
function startWave(n){
game.wave=n;
waveEnemiesLeft=n<=3?n*3+2:n<=6?n*3+8:n*3+15;
if(n%5===0){enemiesToSpawn=1}else{enemiesToSpawn=waveEnemiesLeft}
spawnTimer=0;
}
function spawnEnemy(){
let type='slime';
if(game.wave>=4&&Math.random()<.3)type='skeleton';
if(game.wave>=7&&Math.random()<.2)type='orc';
if(game.wave%5===0&&enemiesToSpawn===1)type='boss';
const t=ENEMY_TYPES[type];
const side=Math.floor(Math.random()*4);
let x,y;
if(side===0){x=Math.random()*400;y=-20}
else if(side===1){x=420;y=Math.random()*600}
else if(side===2){x=Math.random()*400;y=620}
else{x=-20;y=Math.random()*600}
enemies.push({x,y,r:t.r,speed:t.speed,hp:t.hp,maxHp:t.hp,color:t.color,type,txt:t.xp,gold:t.gold});
}
function loop(){
if(!game.running)return;
ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,400,600);
gameTime=Math.floor((Date.now()-game.startTime)/1000);
const mm=String(Math.floor(gameTime/60)).padStart(2,'0'),ss=String(gameTime%60).padStart(2,'0');
document.getElementById('timer').textContent=mm+':'+ss;
if(keys['ArrowUp']||keys['KeyW'])player.y-=player.moveSpeed;
if(keys['ArrowDown']||keys['KeyS'])player.y+=player.moveSpeed;
if(keys['ArrowLeft']||keys['KeyA'])player.x-=player.moveSpeed;
if(keys['ArrowRight']||keys['KeyD'])player.x+=player.moveSpeed;
player.x=Math.max(player.r,Math.min(400-player.r,player.x));
player.y=Math.max(player.r,Math.min(600-player.r,player.y));
if(enemiesToSpawn>0){
spawnTimer++;
if(spawnTimer>=Math.max(20,60-game.wave*2)){
spawnEnemy();enemiesToSpawn--;spawnTimer=0;
}}
if(enemiesToSpawn===0&&enemies.length===0){
game.waveTimer++;
if(game.waveTimer>=game.waveDelay){
game.waveTimer=0;startWave(game.wave+1);
}}
attackTimer+=player.atkSpeed/60;
if(attackTimer>=1){
attackTimer=0;
let target=null,minDist=player.atkRange;
for(const e of enemies){
const d=Math.hypot(e.x-player.x,e.y-player.y);
if(d<minDist){minDist=d;target=e}
}
if(target){
projectiles.push({x:player.x,y:player.y,tx:target.x,ty:target.y,speed:8,atk:player.atk});
}}
for(let i=projectiles.length-1;i>=0;i--){
const p=projectiles[i];
const dx=p.tx-p.x,dy=p.ty-p.y,dist=Math.hypot(dx,dy);
if(dist<p.speed){projectiles.splice(i,1);continue}
p.x+=dx/dist*p.speed;p.y+=dy/dist*p.speed;
for(let j=enemies.length-1;j>=0;j--){
const e=enemies[j];
if(Math.hypot(p.x-e.x,p.y-e.y)<e.r+4){
e.hp-=p.atk;
particles.push({x:p.x,y:p.y,color:'#fff',v:2,life:10});
projectiles.splice(i,1);
if(e.hp<=0){
for(let k=0;k<e.txt;k++)xpOrbs.push({x:e.x,y:e.y,r:4,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:120});
for(let k=0;k<e.gold;k++)goldOrbs.push({x:e.x,y:e.y,r:5,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:180});
enemies.splice(j,1);game.kills++;
}}
break;
}}
for(const e of enemies){
let dx=player.x-e.x,dy=player.y-e.y,dist=Math.hypot(dx,dy);
if(dist>0){e.x+=dx/dist*e.speed;e.y+=dy/dist*e.speed}
if(dist<player.r+e.r){
player.hp-=e.speed*0.5;
particles.push({x:player.x,y:player.y,color:'#ff4444',v:3,life:15});
if(player.hp<=0){player.hp=0;gameOver()}
}}
for(let i=xpOrbs.length-1;i>=0;i--){
const o=xpOrbs[i];
o.x+=o.vx;o.y+=o.vy;o.vx*=.95;o.vy*=.95;o.life--;
if(o.life<=0){xpOrbs.splice(i,1);continue}
if(Math.hypot(o.x-player.x,o.y-player.y)<player.pickupRange){
player.xp++;xpOrbs.splice(i,1);
if(player.xp>=player.xpNext){levelUp()}
}}
for(let i=goldOrbs.length-1;i>=0;i--){
const o=goldOrbs[i];
o.x+=o.vx;o.y+=o.vy;o.vx*=.95;o.vy*=.95;o.life--;
if(o.life<=0){goldOrbs.splice(i,1);continue}
if(Math.hypot(o.x-player.x,o.y-player.y)<player.pickupRange){
game.gold+=1;goldOrbs.splice(i,1);
}}
for(let i=particles.length-1;i>=0;i--){
particles[i].life--;
if(particles[i].life<=0){particles.splice(i,1)}
}
for(const o of xpOrbs){ctx.fillStyle='#44ff44';ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill()}
for(const o of goldOrbs){ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill()}
for(const p of particles){ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}
ctx.strokeStyle='#4a9eff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.stroke();
ctx.strokeStyle='rgba(74,158,255,.1)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(player.x,player.y,player.atkRange,0,Math.PI*2);ctx.stroke();
for(const e of enemies){
ctx.fillStyle=e.color;
if(e.type==='boss'){ctx.fillRect(e.x-e.r,e.y-e.r,e.r*2,e.r*2)}else{ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill()}
ctx.fillStyle='#000';ctx.beginPath();ctx.arc(e.x,e.y-e.r/3,e.r/5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e.x+e.r/3,e.y-e.r/3,e.r/5,0,Math.PI*2);ctx.fill()
}
const hpPct=(player.hp/player.maxHp)*100;
document.getElementById('hpfill').style.width=hpPct+'%';
document.getElementById('hptext').textContent=Math.ceil(player.hp)+'/'+player.maxHp;
const xpPct=(player.xp/player.xpNext)*100;
document.getElementById('xpfill').style.width=xpPct+'%';
document.getElementById('xptext').textContent='Lv.'+player.level+' ('+player.xp+'/'+player.xpNext+')';
document.getElementById('wave').textContent=game.wave;
document.getElementById('kills').textContent=game.kills;
document.getElementById('gold').textContent=game.gold;
requestAnimationFrame(loop);
}
function levelUp(){
player.level++;player.xp=0;player.xpNext=Math.floor(player.xpNext*1.5);
showSkillPicker();
}
function showSkillPicker(){
game.running=false;
document.getElementById('levelup').style.display='flex';
const cards=document.getElementById('skillcards');
cards.innerHTML='';
const picked=[];
while(picked.length<3){const s=SKILLS[Math.floor(Math.random()*SKILLS.length)];if(!picked.includes(s)){picked.push(s)}}
picked.forEach(skill=>{
const div=document.createElement('div');div.className='card';
div.innerHTML='<div class="icon">'+skill.icon+'</div><div class="name">'+skill.name+'</div><div class="desc">'+skill.desc+'</div>';
div.onclick=()=>{skill.fn();document.getElementById('levelup').style.display='none';game.running=true;requestAnimationFrame(loop)};
cards.appendChild(div);
});
}
function gameOver(){
game.running=false;
const mm=String(Math.floor(gameTime/60)).padStart(2,'0'),ss=String(gameTime%60).padStart(2,'0');
document.getElementById('deathstats').innerHTML='Wave: '+game.wave+'<br>Kills: '+game.kills+'<br>Time: '+mm+':'+ss+'<br>Gold: '+game.gold;
document.getElementById('death').style.display='flex';
}
function revive(){player.hp=player.maxHp*0.5;document.getElementById('death').style.display='none';game.running=true;requestAnimationFrame(loop)}
function restart(){document.getElementById('death').style.display='none';startGame()}
document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',e=>keys[e.code]=false);
let dragging=false,touchX=0,touchY=0;
canvas.addEventListener('touchstart',e=>{dragging=true;const t=e.touches[0];touchX=t.clientX;touchY=t.clientY});
canvas.addEventListener('touchmove',e=>{
e.preventDefault();dragging=true;
const t=e.touches[0];const dx=t.clientX-touchX,dy=t.clientY-touchY;
player.x+=dx*.5;player.y+=dy*.5;
player.x=Math.max(player.r,Math.min(400-player.r,player.x));
player.y=Math.max(player.r,Math.min(600-player.r,player.y));
touchX=t.clientX;touchY=t.clientY;
},{passive:false});
canvas.addEventListener('touchend',()=>dragging=false);
</script>
</body>
</html>
